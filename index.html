<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060d1a" />
  <title></title>
  <meta name="description" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --dq9y5r9f2m9m8: 69925; }

    html { scroll-behavior: smooth; background: #060d1a; }

    body {
      background: #060d1a;
      color: #e8f0fe;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Keyframes ─────────────────────────────────── */

    @keyframes glow-drift-a {
      0%   { transform: translate(0,    0)    scale(1);    }
      25%  { transform: translate(8%,  -10%) scale(1.08); }
      55%  { transform: translate(14%, -4%)  scale(0.95); }
      80%  { transform: translate(4%,   8%)  scale(1.05); }
      100% { transform: translate(0,    0)   scale(1);    }
    }
    @keyframes glow-drift-b {
      0%   { transform: translate(0,   0)    scale(1);    }
      30%  { transform: translate(-10%, 6%)  scale(1.1);  }
      60%  { transform: translate(-6%, -8%)  scale(0.93); }
      85%  { transform: translate(5%,  -3%)  scale(1.04); }
      100% { transform: translate(0,   0)    scale(1);    }
    }
    @keyframes halo-breathe {
      0%, 100% { opacity: .55; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: .85; transform: translate(-50%,-50%) scale(1.08); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes step-pop {
      0%  { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.15); }
      100%{ transform: scale(1);   opacity: 1; }
    }
    @keyframes shimmer-sweep {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes float-badge {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-4px); }
    }
    @keyframes beam-sweep {
      0%   { transform: translateX(-100%) skewX(-12deg); opacity: 0;   }
      5%   { opacity: 1;   }
      95%  { opacity: .6;  }
      100% { transform: translateX(200vw)  skewX(-12deg); opacity: 0;   }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes faq-open {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── Layout ────────────────────────────────────── */

    .page-wrap {
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ────────────────────────────────── */

    #bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    #bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      mix-blend-mode: screen;
    }
    .dot-grid {
      position: absolute;
      inset: 0;
      opacity: .30;
      background-image: radial-gradient(circle, rgba(77,159,255,.18) 1px, transparent 1px);
      background-size: 36px 36px;
    }
    .bg-glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .bg-glow-1 {
      top: 5%; left: 10%;
      width: 38vw; height: 38vw;
      background: radial-gradient(circle, rgba(77,159,255,.22) 0%, rgba(77,159,255,.06) 45%, transparent 70%);
      filter: blur(28px);
      animation: glow-drift-a 18s ease-in-out infinite;
    }
    .bg-glow-2 {
      bottom: 8%; right: 8%;
      width: 34vw; height: 34vw;
      background: radial-gradient(circle, rgba(124,106,247,.18) 0%, rgba(124,106,247,.05) 45%, transparent 70%);
      filter: blur(32px);
      animation: glow-drift-b 22s ease-in-out infinite;
    }
    .bg-glow-3 {
      top: 35%; right: 18%;
      width: 24vw; height: 24vw;
      background: radial-gradient(circle, rgba(77,159,255,.11) 0%, transparent 65%);
      filter: blur(20px);
      animation: glow-drift-a 28s ease-in-out 6s infinite reverse;
    }
    .bg-beam {
      position: absolute;
      height: 1px;
      left: 0;
      filter: blur(1px);
    }
    .bg-beam-1 {
      top: 38%; width: 30vw;
      background: linear-gradient(90deg, transparent, rgba(77,159,255,.5), rgba(124,106,247,.4), transparent);
      animation: beam-sweep 9s ease-in-out 1.5s infinite;
    }
    .bg-beam-2 {
      top: 62%; width: 20vw;
      background: linear-gradient(90deg, transparent, rgba(124,106,247,.35), transparent);
      animation: beam-sweep 13s ease-in-out 7s infinite;
    }

    /* ── Navbar ────────────────────────────────────── */

    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 1rem 2.5rem;
      background: linear-gradient(to bottom, rgba(6,13,26,.92) 0%, rgba(6,13,26,0) 100%);
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .375rem .875rem;
      border-radius: 9999px;
      background: rgba(52,208,88,.07);
      border: 1px solid rgba(52,208,88,.22);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34d058;
      animation: halo-breathe 2.5s ease-in-out infinite;
    }
    .status-text {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .05em;
      color: #34d058;
    }

    /* ── Hero ──────────────────────────────────────── */

    .hero {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 7rem 1rem 4rem;
    }

    .hero-bloom {
      position: absolute;
      left: 50%; top: 50%;
      width: 900px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(77,159,255,.18) 0%, rgba(124,106,247,.10) 40%, transparent 70%);
      filter: blur(24px);
      pointer-events: none;
      animation: halo-breathe 3.5s ease-in-out infinite;
    }
    .hero-bloom-2 {
      position: absolute;
      left: 55%; top: 45%;
      width: 500px; height: 380px;
      border-radius: 50%;
      transform: translate(-30%,-50%);
      background: radial-gradient(ellipse at center, rgba(124,106,247,.13) 0%, transparent 65%);
      filter: blur(40px);
      pointer-events: none;
    }

    .hero-text {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .eyebrow-pill {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .375rem 1rem;
      border-radius: 9999px;
      background: rgba(77,159,255,.06);
      border: 1px solid rgba(77,159,255,.22);
      margin-bottom: 1.5rem;
      animation: fade-in-up .7s cubic-bezier(.16,1,.3,1) forwards;
    }
    .eyebrow-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4d9fff;
      animation: halo-breathe 2s ease-in-out infinite;
    }
    .eyebrow-text {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .06em;
      color: #4d9fff;
    }
    h1.hero-title {
      max-width: 700px;
      font-size: clamp(2.6rem, 7vw, 4.5rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -.03em;
      color: #e8f0fe;
      text-wrap: balance;
      opacity: 0;
      animation: fade-in-up .8s .1s cubic-bezier(.16,1,.3,1) forwards;
    }
    .text-shimmer {
      background: linear-gradient(90deg, #4d9fff 0%, #7c6af7 40%, #4d9fff 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer-sweep 4s linear infinite;
    }
    .hero-sub {
      max-width: 420px;
      margin-top: 1.25rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #7b8fa8;
      text-wrap: pretty;
      opacity: 0;
      animation: fade-in-up .8s .22s cubic-bezier(.16,1,.3,1) forwards;
    }

    /* ── Card wrapper ──────────────────────────────── */

    .card-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 720px;
      opacity: 0;
      animation: fade-in-up .8s .38s cubic-bezier(.16,1,.3,1) forwards;
    }
    .card-glow-ring {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      pointer-events: none;
      box-shadow:
        0 0 0 1px rgba(77,159,255,.10),
        0 0 60px -10px rgba(77,159,255,.25),
        0 0 120px -20px rgba(124,106,247,.20);
    }

    /* ── Delivery card ─────────────────────────────── */

    .delivery-card {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(15,30,53,.95) 0%, rgba(11,22,40,.98) 100%);
      border: 1px solid rgba(77,159,255,.18);
      box-shadow:
        0 0 0 1px rgba(124,106,247,.06) inset,
        0 24px 64px -12px rgba(0,0,0,.8),
        0 0 80px -20px rgba(77,159,255,.18);
      backdrop-filter: blur(12px);
    }
    .card-strip-top {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(77,159,255,.6) 30%, rgba(124,106,247,.6) 60%, transparent 100%);
    }
    .card-strip-bottom {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(124,106,247,.4) 40%, rgba(77,159,255,.4) 70%, transparent 100%);
    }

    /* card header */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(77,159,255,.10);
    }
    .card-header-left {
      display: flex;
      align-items: center;
      gap: .625rem;
    }
    .header-dot-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 12px; height: 12px;
    }
    .header-dot-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #34d058;
      opacity: .4;
      animation: halo-breathe 3s ease-in-out infinite;
    }
    .header-dot-core {
      position: relative;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #34d058;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #e8f0fe;
      letter-spacing: -.01em;
    }
    .active-badge {
      padding: .2rem .625rem;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      color: #34d058;
      background: rgba(52,208,88,.08);
      border: 1px solid rgba(52,208,88,.22);
    }

    /* steps */
    .card-steps { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: .75rem; }
    .step-row { display: flex; align-items: center; gap: .875rem; }
    .step-icon { flex-shrink: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    .step-icon-done {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(52,208,88,.15);
      border: 1px solid rgba(52,208,88,.4);
      animation: step-pop .35s cubic-bezier(.16,1,.3,1);
    }
    .step-icon-active {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #4d9fff;
      border-top-color: transparent;
      animation: spin .8s linear infinite;
    }
    .step-icon-pending {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(77,159,255,.15);
      background: rgba(77,159,255,.04);
    }
    .step-label {
      font-size: 14px;
      transition: color .5s;
    }
    .step-label.done   { color: #34d058; }
    .step-label.active { color: #e8f0fe; }
    .step-label.pending{ color: #3a4a5e; }
    .step-meta { margin-left: auto; font-size: 11px; color: #3a4a5e; }

    /* progress */
    .card-progress { padding: 0 1.5rem 1.25rem; }
    .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .progress-label { font-size: 11px; color: #7b8fa8; }
    .progress-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #7b8fa8;
      font-variant-numeric: tabular-nums;
    }
    .progress-track {
      height: 6px;
      border-radius: 9999px;
      overflow: hidden;
      background: rgba(77,159,255,.08);
    }
    .progress-fill {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #4d9fff 0%, #7c6af7 100%);
      box-shadow: 0 0 10px rgba(77,159,255,.6);
      transition: width .3s ease;
      width: 0%;
    }

    /* terminal */
    .card-terminal {
      padding: 1rem 1.5rem;
      background: rgba(4,9,20,.8);
      border-top: 1px solid rgba(77,159,255,.08);
    }
    .terminal-dots { display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; }
    .t-dot { width: 10px; height: 10px; border-radius: 50%; }
    .t-dot-red   { background: #ff5f57; opacity: .7; }
    .t-dot-yel   { background: #febc2e; opacity: .7; }
    .t-dot-grn   { background: #28c840; opacity: .7; }
    .terminal-tag {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #3a4a5e;
    }
    .terminal-log { display: flex; flex-direction: column; gap: 6px; }
    .t-line {
      display: flex;
      gap: .625rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      opacity: 0;
      animation: fade-in-up .35s ease-out forwards;
    }
    .t-line:nth-child(1) { animation-delay: .4s;  }
    .t-line:nth-child(2) { animation-delay: 1.2s; }
    .t-line:nth-child(3) { animation-delay: 2.1s; }
    .t-line:nth-child(4) { animation-delay: 3.0s; }
    .t-line:nth-child(5) { animation-delay: 4.0s; }
    .t-line:nth-child(6) { animation-delay: 5.1s; }
    .t-cursor {
      display: flex; gap: .625rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .t-cursor-blink { color: #4d9fff; animation: blink-cursor 1.1s step-end infinite; }

    /* metadata */
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1.5rem;
      border-top: 1px solid rgba(77,159,255,.08);
    }
    .meta-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #3a4a5e;
    }
    .meta-key { color: #7b8fa8; }
    .meta-sep { color: #1e2d42; margin: 0 .375rem; }
    .meta-right {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #3a4a5e;
    }

    /* ── How it works ──────────────────────────────── */

    .section { position: relative; z-index: 10; }
    .how-section { padding: 5rem 1rem; }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: #3a4a5e;
      text-align: center;
      margin-bottom: .75rem;
    }
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.02em;
      color: #e8f0fe;
      text-align: center;
      text-wrap: balance;
      margin-bottom: 2.5rem;
    }
    .steps-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: .75rem;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (min-width: 640px) {
      .steps-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .step-card {
      position: relative;
      border-radius: 12px;
      padding: 1.25rem;
      background: linear-gradient(145deg, rgba(11,22,40,.9) 0%, rgba(9,18,34,.95) 100%);
      border: 1px solid rgba(77,159,255,.18);
      transition: border-color .3s;
    }
    .step-card-top {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 1px;
      border-radius: 12px 12px 0 0;
    }
    .step-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .step-icon-box {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .step-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #1e2d42;
    }
    .step-h3 { font-size: 14px; font-weight: 600; color: #e8f0fe; margin-bottom: .375rem; }
    .step-p  { font-size: 12px; line-height: 1.6; color: #7b8fa8; }
    .step-arrow {
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      z-index: 1;
    }
    @media (min-width: 640px) { .step-arrow { display: block; } }

    /* ── Trust badges ──────────────────────────────── */

    .trust-section { padding: 0 1rem 5rem; }
    .trust-sep {
      height: 1px;
      max-width: 900px;
      margin: 0 auto 2rem;
      background: linear-gradient(90deg, transparent, rgba(77,159,255,.15) 30%, rgba(124,106,247,.15) 60%, transparent);
    }
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: .625rem;
      padding: .625rem 1rem;
      border-radius: 9999px;
      animation: float-badge 3s ease-in-out infinite;
      transition: transform .2s;
    }
    .badge:hover { transform: scale(1.05); }
    .badge-icon-wrap {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .badge-label { font-size: 12px; font-weight: 600; }
    .badge-sub   { font-size: 10px; color: #3a4a5e; margin-top: 1px; }

    /* ── FAQ ───────────────────────────────────────── */

    .faq-section { padding: 0 1rem 7rem; }
    .faq-wrap { max-width: 640px; margin: 0 auto; }
    .faq-items { display: flex; flex-direction: column; gap: .5rem; }
    .faq-item {
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s, background .2s;
    }
    .faq-item.closed {
      background: rgba(9,18,34,.6);
      border: 1px solid rgba(77,159,255,.08);
    }
    .faq-item.open {
      background: linear-gradient(145deg, rgba(11,22,40,.95) 0%, rgba(9,18,34,.98) 100%);
      border: 1px solid rgba(77,159,255,.2);
    }
    .faq-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 1rem 1.25rem;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .faq-q { font-size: 14px; font-weight: 500; color: #e8f0fe; }
    .faq-chevron {
      flex-shrink: 0;
      transition: transform .3s;
    }
    .faq-chevron.rotated { transform: rotate(180deg); }
    .faq-answer {
      display: none;
      padding: 0 1.25rem 1.25rem;
      border-top: 1px solid rgba(77,159,255,.08);
      animation: faq-open .25s ease-out;
    }
    .faq-answer.visible { display: block; }
    .faq-a { padding-top: 1rem; font-size: 14px; line-height: 1.6; color: #7b8fa8; }

    /* ── Footer ────────────────────────────────────── */

    .footer {
      position: relative;
      z-index: 10;
      padding: 1.5rem;
      text-align: center;
      border-top: 1px solid rgba(77,159,255,.07);
    }
    .footer p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #1e2d42;
    }
  </style>

  <!-- vw-delivery-assets -->
  <style id="vw-delivery-style">
  .vxf-off { display: none !important; }
  #vw-delivery-bundle .progress {
    height: 8px; border-radius: 999px; background: hsla(210,40%,98%,.06); overflow: hidden; border: 1px solid var(--border, rgba(255,255,255,.08));
  }
  #vw-delivery-bundle .progress #progressFill,
  #vw-delivery-bundle .progress .progress-fill {
    display: block; height: 100%; box-sizing: border-box;
  }
  #vw-delivery-bundle .ring {
    width: 44px; height: 44px; border-radius: 50%;
    background: conic-gradient(from 90deg, var(--primary, var(--accent, #34d058)) 0%, var(--primary, var(--accent, #34d058)) 40%, hsla(142,76%,56%,.25) 72%, transparent 100%);
    -webkit-mask: radial-gradient(closest-side, transparent 64%, black 66%);
    mask: radial-gradient(closest-side, transparent 64%, black 66%);
    animation: vw-dl-ring 1.6s linear infinite;
  }
  @keyframes vw-dl-ring { to { transform: rotate(360deg); } }
  #vw-delivery-bundle .ring.ring-done {
    animation: none; -webkit-mask: none; mask: none;
    background: linear-gradient(135deg, var(--primary, var(--accent, #34d058)), var(--green, #28a745));
    color: var(--bg, #060d1a); font-size: 18px; font-weight: 700;
    display: grid; place-items: center;
  }
  #vw-delivery-bundle .ring.ring-err {
    animation: none; -webkit-mask: none; mask: none;
    background: linear-gradient(135deg, #ff5f57, #ffb84d);
    color: var(--bg, #060d1a); font-size: 16px; font-weight: 700;
    display: grid; place-items: center;
  }
  #vw-delivery-bundle .retry-btn {
    margin: 0 0 12px; padding: 8px 14px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border, rgba(255,255,255,.08)); background: var(--card, #0c1525); color: var(--fg, var(--text, #e8f0fe));
    cursor: pointer; font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  #vw-delivery-bundle #nsStatText.ns-sub-ok { color: var(--green, #34d058); }
  #vw-delivery-bundle #nsStatText.ns-sub-err { color: #ff8f8a; }
  #vw-delivery-bundle .terminal-body .ns-log-line {
    color: var(--primary, var(--accent, #34d058)); font-size: 11px; margin-bottom: 6px; line-height: 1.4; opacity: 0.92;
  }
  #vw-delivery-bundle #nsCursor { display: inline-block; min-width: 8px; animation: vw-cursor-blink 1s steps(2) infinite; }
  @keyframes vw-cursor-blink { 50% { opacity: 0; } }
  </style>

<script>
/* ── Particle canvas ───────────────────────────── */
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  const COLORS = ['rgba(77,159,255,', 'rgba(124,106,247,', 'rgba(77,159,255,'];

  let W = window.innerWidth, H = window.innerHeight;
  canvas.width = W; canvas.height = H;

  window.addEventListener('resize', function () {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
  });

  function spawn() {
    return {
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -0.15 - Math.random() * 0.35,
      r: 1 + Math.random() * 1.6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      life: 0, maxLife: 220 + Math.random() * 280
    };
  }

  const pts = [];
  for (let i = 0; i < 55; i++) {
    const p = spawn();
    p.life = Math.random() * p.maxLife;
    pts.push(p);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
      p.life++; p.x += p.vx; p.y += p.vy;
      const prog = p.life / p.maxLife;
      const op   = prog < 0.15 ? prog / 0.15 : prog > 0.75 ? (1 - prog) / 0.25 : 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + (op * 0.75).toFixed(2) + ')';
      ctx.fill();
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0, p.color + (op * 0.18).toFixed(2) + ')');
      g.addColorStop(1, p.color + '0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      if (p.life >= p.maxLife) Object.assign(p, spawn());
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Delivery card logic ───────────────────────── */
(function () {
  const STEPS = [
    { completedAt: 1400 },
    { completedAt: 3200 },
    { completedAt: 5600 }
  ];

  function setStepDone(idx) {
    const icon  = document.getElementById('step-icon-'  + idx);
    const label = document.getElementById('step-label-' + idx);
    const meta  = document.getElementById('step-meta-'  + idx);
    icon.innerHTML = '<div class="step-icon-done"><svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-label="Completed"><path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="#34d058" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
    label.className = 'step-label done';
    meta.textContent = 'done';
  }

  function setStepActive(idx) {
    const icon  = document.getElementById('step-icon-'  + idx);
    const label = document.getElementById('step-label-' + idx);
    const meta  = document.getElementById('step-meta-'  + idx);
    icon.innerHTML  = '<div class="step-icon-active"></div>';
    label.className = 'step-label active';
    meta.textContent = 'in progress\u2026';
  }

  STEPS.forEach(function (step, idx) {
    setTimeout(function () {
      setStepDone(idx);
      if (idx + 1 < STEPS.length) setStepActive(idx + 1);
    }, step.completedAt);
  });

  /* progress bar */
  const fill = document.getElementById('progress-fill');
  const pct  = document.getElementById('progress-pct');
  const start = Date.now();
  const TARGET = 90, DURATION = 6000;

  (function tick() {
    const elapsed = Date.now() - start;
    const val = Math.min(TARGET, (elapsed / DURATION) * TARGET);
    const rounded = Math.round(val);
    fill.style.width = rounded + '%';
    pct.textContent  = rounded + '%';
    if (elapsed < DURATION) requestAnimationFrame(tick);
  })();
})();

/* ── FAQ accordion ─────────────────────────────── */
(function () {
  document.querySelectorAll('.faq-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const item    = btn.closest('.faq-item');
      const answer  = item.querySelector('.faq-answer');
      const chevron = btn.querySelector('.faq-chevron');
      const isOpen  = item.classList.contains('open');

      /* close all */
      document.querySelectorAll('.faq-item').forEach(function (el) {
        el.classList.replace('open', 'closed');
        el.querySelector('.faq-answer').classList.remove('visible');
        el.querySelector('.faq-chevron').classList.remove('rotated');
        el.querySelector('.faq-btn').setAttribute('aria-expanded', 'false');
